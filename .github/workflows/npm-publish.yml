# Push a tag like v0.5.0 -> publishes to npm + creates the GitHub release.
# Flow: bump "version" in package.json, commit, then:
#   git tag v0.5.0 && git push origin v0.5.0
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      # Fail early if tag doesn't match package.json version.
      - name: Check tag matches version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          [ "$PKG" = "$TAG" ] || { echo "tag $TAG != package.json $PKG"; exit 1; }

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; setup-node ships older.
      - run: npm install -g npm@latest
      - run: npm publish --access public

      - name: GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
